server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;
    charset utf-8;

    client_max_body_size 64M;

    # Block Smarty filecache
    location ~* ^/templates_c/filecache/ {
        return 403;
    }

    # Sitemap / URL list
    location ~* ^/(urllist|sitemap_).*\.(xml|txt)(\.gz)?$ {
        rewrite ^/(.*) /includes/sitemap.php?datei=$1 last;
    }

    # Export sitemap passthrough
    location ~* ^/export/((sitemap_).*\.(xml|txt)(\.gz)?)$ {
        rewrite ^/export/(.*) /$1 last;
    }

    # Asset minifier
    location ~* ^/asset/ {
        rewrite ^/asset/(.*) /includes/libs/minify/?g=$1 last;
    }

    # Static compiled assets
    location ~* ^/static/ {
        rewrite ^/static/(.*) /templates_c/min/$1 last;
    }

    # Block dbeS tmp
    location ~* ^/dbeS/tmp/ {
        return 403;
    }

    # dbeS PHP router
    location ~* ^/dbeS/(.*)\.php$ {
        rewrite ^/dbeS/(.*)\.php$ /dbeS/index.php?id=$1 last;
    }

    # Block other dbeS paths
    location ~* ^/dbeS/ {
        return 403;
    }

    # robots.txt via PHP
    location = /robots.txt {
        rewrite ^ /robots.php last;
    }

    # Main frontend routing
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "error_log=/var/log/nginx/php_errors.log";
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
