services:
  php:
    build:
      context: .docker/php
    container_name: jtl_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/jtl-custom.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jtl_network

  nginx:
    image: nginx:alpine
    container_name: jtl_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - jtl_network

  mysql:
    image: mysql:8.0
    container_name: jtl_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - jtl_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql_mode=NO_ENGINE_SUBSTITUTION

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: jtl_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jtl_network

volumes:
  mysql_data:
    name: jtl_bauer_mysql_data

networks:
  jtl_network:
    name: jtl_bauer_network
